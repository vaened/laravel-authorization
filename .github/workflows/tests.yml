name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    name: PHP 8.4 / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - laravel: 12
            testbench: "^10.5"
          - laravel: 13
            testbench: "^11.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: >-
          composer update
          --with "laravel/framework:^${{ matrix.laravel }}.0"
          --with "orchestra/testbench:${{ matrix.testbench }}"
          --with-all-dependencies
          --no-interaction
          --no-progress
          --prefer-dist

      - name: Run tests
        run: vendor/bin/phpunit
